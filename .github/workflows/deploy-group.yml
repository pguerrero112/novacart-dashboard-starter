name: Deploy Group

on:
  workflow_dispatch:
    inputs:
      group_number:
        description: 'Group number (e.g. 1, 2, 3...)'
        required: true
        type: string
      fork_url:
        description: 'Intern fork URL (e.g. https://github.com/intern-name/novacart-dashboard-starter)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      REPO_URL: ${{ secrets.REPO_URL }}
      GROUP: ${{ github.event.inputs.group_number }}
      DB: NOVACART_DB
      SCHEMA: APP
      EXT_ROLE: NOVACART_EXT_ROLE

    steps:
      - name: Checkout original repo (for scripts)
        uses: actions/checkout@v4
        with:
          path: original

      - name: Parse fork URL
        id: parse
        run: |
          FORK_URL="${{ github.event.inputs.fork_url }}"
          REPO=$(echo "$FORK_URL" | sed 's|https://github.com/||' | sed 's|http://github.com/||' | sed 's|/$||')
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "Deploying from: $REPO"

      - name: Checkout intern fork
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.parse.outputs.repo }}
          ref: main
          path: fork

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs --quiet

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8
          cat > ~/.snowflake/config.toml << 'TOML'
          [connections.spcs]
          account = "VEB81086.us-east-1"
          user = "PGUERRERO"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "/tmp/rsa_key.p8"
          role = "NOVACART_ADMIN_ROLE"
          TOML
          chmod 0600 ~/.snowflake/config.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Snowflake registry
        run: |
          snow spcs image-registry login \
            --connection spcs \
            --account VEB81086.us-east-1 \
            --user PGUERRERO \
            --authenticator SNOWFLAKE_JWT \
            --private-key-file /tmp/rsa_key.p8

      - name: Build & push backend
        working-directory: fork
        run: |
          docker build --platform linux/amd64 -t backend_service_image_group${GROUP}:latest ./backend
          docker tag backend_service_image_group${GROUP}:latest $REPO_URL/backend_service_image_group${GROUP}:latest
          docker push $REPO_URL/backend_service_image_group${GROUP}:latest

      - name: Build & push frontend
        working-directory: fork
        run: |
          docker build --platform linux/amd64 -t frontend_service_image_group${GROUP}:latest ./frontend
          docker tag frontend_service_image_group${GROUP}:latest $REPO_URL/frontend_service_image_group${GROUP}:latest
          docker push $REPO_URL/frontend_service_image_group${GROUP}:latest

      - name: Build & push router
        working-directory: original
        run: |
          docker build --platform linux/amd64 -t router_service_image_group${GROUP}:latest ./router
          docker tag router_service_image_group${GROUP}:latest $REPO_URL/router_service_image_group${GROUP}:latest
          docker push $REPO_URL/router_service_image_group${GROUP}:latest

      - name: Recreate SPCS service
        run: |
          snow sql --connection spcs -q "
          USE ROLE NOVACART_ADMIN_ROLE;
          USE DATABASE $DB;
          USE SCHEMA $SCHEMA;
          DROP SERVICE IF EXISTS backend_service_group${GROUP};
          DROP SERVICE IF EXISTS frontend_service_group${GROUP};
          CREATE SERVICE frontend_service_group${GROUP}
            IN COMPUTE POOL NOVACART_BACKEND_POOL
            FROM SPECIFICATION \$\$
            spec:
              container:
              - name: backend
                image: $REPO_URL/backend_service_image_group${GROUP}:latest
                env:
                  PORT: '8001'
                  DATA_BACKEND: snowflake
                  CLIENT_VALIDATION: Snowflake
                  SNOWFLAKE_ACCOUNT: VEB81086.us-east-1
                  SNOWFLAKE_DATABASE: NOVACART_DB
                  SNOWFLAKE_SCHEMA: APP
                  SNOWFLAKE_WAREHOUSE: NOVACART_APP_WH
              - name: frontend
                image: $REPO_URL/frontend_service_image_group${GROUP}:latest
                env:
                  PORT: '3000'
                  REACT_APP_BACKEND_URL: /api
              - name: router
                image: $REPO_URL/router_service_image_group${GROUP}:latest
                env:
                  FRONTEND_SERVICE: localhost:3000
                  BACKEND_SERVICE: localhost:8001
              endpoint:
              - name: routerendpoint
                port: 8000
                public: true
            \$\$
            MIN_INSTANCES=1 MAX_INSTANCES=1;
          GRANT USAGE ON SERVICE frontend_service_group${GROUP} TO ROLE $EXT_ROLE;
          GRANT SERVICE ROLE frontend_service_group${GROUP}!ALL_ENDPOINTS_USAGE TO ROLE $EXT_ROLE;
          "

      - name: Wait and get URL
        run: |
          echo "Waiting for service to be ready..."
          sleep 120
          for i in {1..10}; do
            snow sql --connection spcs -q "USE DATABASE $DB; USE SCHEMA $SCHEMA; SHOW ENDPOINTS IN SERVICE frontend_service_group${GROUP};" --format json > /tmp/endpoints.json || true
            URL=$(python3 original/.github/scripts/get_url.py || echo "")
            if [ -n "$URL" ]; then
              echo "## ✅ Group $GROUP deployed" >> $GITHUB_STEP_SUMMARY
              echo "**Fork:** ${{ github.event.inputs.fork_url }}" >> $GITHUB_STEP_SUMMARY
              echo "**URL:** https://$URL" >> $GITHUB_STEP_SUMMARY
              echo "Group $GROUP app URL: https://$URL"
              exit 0
            fi
            echo "Still provisioning... ($i/10)"
            sleep 30
          done
          echo "## ✅ Group $GROUP deployed — check Snowflake for URL" >> $GITHUB_STEP_SUMMARY
          echo "Service deployed but URL not ready yet."
          echo "Run in Snowflake: SHOW ENDPOINTS IN SERVICE frontend_service_group${GROUP};"

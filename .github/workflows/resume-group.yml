name: Resume Group

on:
  workflow_dispatch:
    inputs:
      group_number:
        description: 'Group number to resume (e.g. 1, 2, 3...)'
        required: true
        type: string

jobs:
  resume:
    runs-on: ubuntu-latest

    env:
      DB: NOVACART_DB
      SCHEMA: APP
      GROUP: ${{ github.event.inputs.group_number }}

    steps:
      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs --quiet

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8
          cat > ~/.snowflake/config.toml << 'TOML'
          [connections.spcs]
          account = "VEB81086.us-east-1"
          user = "PGUERRERO"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "/tmp/rsa_key.p8"
          role = "NOVACART_ADMIN_ROLE"
          TOML
          chmod 0600 ~/.snowflake/config.toml

      - name: Resume services
        run: |
          snow sql --connection spcs -q "
          USE ROLE NOVACART_ADMIN_ROLE;
          USE DATABASE $DB;
          USE SCHEMA $SCHEMA;
          ALTER SERVICE IF EXISTS backend_service_group${GROUP}  RESUME;
          ALTER SERVICE IF EXISTS frontend_service_group${GROUP} RESUME;
          "

      - name: Wait and get URL
        run: |
          echo "Waiting for service to start..."
          sleep 90
          snow sql --connection spcs -q "USE DATABASE $DB; USE SCHEMA $SCHEMA; SHOW ENDPOINTS IN SERVICE frontend_service_group${GROUP};" --format json > /tmp/endpoints.json 2>/dev/null || true
          URL=$(python3 .github/scripts/get_url.py 2>/dev/null || echo "")
          echo "## ▶️ Group $GROUP is live" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://$URL" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "Group $GROUP app URL: https://$URL"

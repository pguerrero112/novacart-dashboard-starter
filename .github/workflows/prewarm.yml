name: Pre-warm Registry

on:
  workflow_dispatch:
    inputs:
      group_number:
        description: 'Group number to pre-warm (e.g. 1, 2, 3...)'
        required: true
        type: string

jobs:
  prewarm:
    runs-on: ubuntu-latest

    env:
      REPO_URL: ${{ secrets.REPO_URL }}
      GROUP: ${{ github.event.inputs.group_number }}

    steps:
      - name: Checkout starter repo
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs --quiet

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8
          cat > ~/.snowflake/config.toml << 'TOML'
          [connections.spcs]
          account = "VEB81086.us-east-1"
          user = "PGUERRERO"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "/tmp/rsa_key.p8"
          role = "NOVACART_ADMIN_ROLE"
          TOML
          chmod 0600 ~/.snowflake/config.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Snowflake registry
        run: |
          snow spcs image-registry login \
            --connection spcs \
            --account VEB81086.us-east-1 \
            --user PGUERRERO \
            --authenticator SNOWFLAKE_JWT \
            --private-key-file /tmp/rsa_key.p8

      - name: Build & push backend (starter code)
        run: |
          docker build --platform linux/amd64 \
            -t backend_service_image_group${GROUP}:latest \
            ./backend
          docker tag backend_service_image_group${GROUP}:latest \
            $REPO_URL/backend_service_image_group${GROUP}:latest
          docker push $REPO_URL/backend_service_image_group${GROUP}:latest

      - name: Build & push frontend (starter code)
        run: |
          docker build --platform linux/amd64 \
            -t frontend_service_image_group${GROUP}:latest \
            ./frontend
          docker tag frontend_service_image_group${GROUP}:latest \
            $REPO_URL/frontend_service_image_group${GROUP}:latest
          docker push $REPO_URL/frontend_service_image_group${GROUP}:latest

      - name: Build & push router
        run: |
          docker build --platform linux/amd64 \
            -t router_service_image_group${GROUP}:latest \
            ./router
          docker tag router_service_image_group${GROUP}:latest \
            $REPO_URL/router_service_image_group${GROUP}:latest
          docker push $REPO_URL/router_service_image_group${GROUP}:latest

      - name: Summary
        run: |
          echo "## ✅ Registry pre-warmed for Group $GROUP" >> $GITHUB_STEP_SUMMARY
          echo "Base layers are now cached. Future deploys for this group will be fast." >> $GITHUB_STEP_SUMMARY
